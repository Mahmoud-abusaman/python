<!-- prettier-ignore -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkerboard</title>
    <style>
        body {
            background-color: #2c3e50;
            color: #ecf0f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        h1 {
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 300;
        }
        .checkerboard {
            display: grid;
            width: 550px;
            height: 550px;
            grid-template-columns: repeat({{y}}, 1fr);
            grid-template-rows: repeat({{x}}, 1fr);
            border: 5px solid #34495e;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            overflow: hidden;
        }
        .box {
            width: 100%;
            height: 100%;
        }
        .color1 {
            background-color: {{color1 if color1 else 'red'}}
        }
        .color2 {
            background-color: {{color2 if color2 else 'black'}}
        }
    </style>
</head>
<body>
    <div class="checkerboard">
        {% for i in range(x) %}
        {% for j in range(y) %}
        <div class="box {{'color1' if (i+j)%2==0 else 'color2'}}"></div>
        {% endfor %}
        {% endfor %}
    </div>
</body>
</html>
