<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .result-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .info-label {
            font-weight: bold;
            width: 150px;
            display: inline-block;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="result-container">
            <h2 class="mb-4"><u>Submitted Info</u></h2>
            <div class="mb-2">
                <span class="info-label">Name:</span>
                <span>{{ name }}</span>
            </div>
            <div class="mb-2">
                <span class="info-label">Dojo Location:</span>
                <span>{{ location }}</span>
            </div>
            <div class="mb-2">
                <span class="info-label">Favorite Language:</span>
                <span>{{ language }}</span>
            </div>
            <div class="mb-2">
                <span class="info-label">Gender:</span>
                <span>{{ gender }}</span>
            </div>
            <div class="mb-2">
                <span class="info-label">Interests:</span>
                <span>
                    {% for interest in interests %}
                    {{ interest }}{% if not forloop.last %}, {% endif %}
                    {% empty %}
                    None
                    {% endfor %}
                </span>
            </div>
            <div class="mb-4">
                <span class="info-label">Comment:</span>
                <p class="mt-2">{{ comment }}</p>
            </div>

            <div class="text-end">
                <a href="/" class="btn btn-secondary">Go Back</a>
            </div>
        </div>
    </div>
</body>

</html>
