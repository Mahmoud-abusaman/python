<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dojo Survey</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .survey-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="survey-container">
            <h2 class="text-center mb-4">Dojo Survey Index</h2>
            <form action="/result" method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="name" class="form-label">Your Name:</label>
                    <input type="text" name="name" id="name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="location" class="form-label">Dojo Location:</label>
                    <select name="location" id="location" class="form-select">
                        <option value="San Jose">San Jose</option>
                        <option value="Seattle">Seattle</option>
                        <option value="Chicago">Chicago</option>
                        <option value="Online">Online</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="language" class="form-label">Favorite Language:</label>
                    <select name="language" id="language" class="form-select">
                        <option value="Python">Python</option>
                        <option value="JavaScript">JavaScript</option>
                        <option value="Java">Java</option>
                        <option value="C#">C#</option>
                    </select>
                </div>

                <!-- NINJA BONUS: Radio Buttons -->
                <div class="mb-3">
                    <label class="form-label d-block">Gender:</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender" id="male" value="Male">
                        <label class="form-check-label" for="male">Male</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender" id="female" value="Female">
                        <label class="form-check-label" for="female">Female</label>
                    </div>
                </div>

                <!-- SENSEI BONUS: Checkboxes -->
                <div class="mb-3">
                    <label class="form-label d-block">Interests:</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" name="interests" id="gaming" value="Gaming">
                        <label class="form-check-label" for="gaming">Gaming</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" name="interests" id="hiking" value="Hiking">
                        <label class="form-check-label" for="hiking">Hiking</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" name="interests" id="reading" value="Reading">
                        <label class="form-check-label" for="reading">Reading</label>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="comment" class="form-label">Comment (optional):</label>
                    <textarea name="comment" id="comment" class="form-control" rows="3"></textarea>
                </div>

                <div class="text-end">
                    <button type="submit" class="btn btn-primary">Button</button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
