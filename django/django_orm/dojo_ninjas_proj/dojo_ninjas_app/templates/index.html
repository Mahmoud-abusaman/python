<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dojo Ninjas</title>
</head>
<body>
    <div style="display: flex;">
        <form action="/dojo/new" method="post" style="flex: 1;display: flex;flex-direction: column;margin: 10px;">
            {% csrf_token %}
            <h1>Add a Dojo</h1>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name">
            <label for="city">City:</label>
            <input type="text" id="city" name="city">
            <label for="state">State:</label>
            <input type="text" id="state" name="state">
            <button type="submit">Submit</button>
        </form>
        <form action="/ninja/new" method="post" style="flex: 1;display: flex;flex-direction: column;margin: 10px;">
            {% csrf_token %}
            <h1>Add a Ninja</h1>
            <label for="first_name">First Name:</label>
            <input type="text" id="first_name" name="first_name">
            <label for="last_name">Last Name:</label>
            <input type="text" id="last_name" name="last_name">
            <label for="dojo">Dojo:</label>
            <select name="dojo" id="dojo">
                {% for dojo in dojos %}
                <option value="{{ dojo.id }}">{{ dojo.name }}</option>
                {% endfor %}
            </select>
            <button type="submit">Submit</button>
        </form>
    </div>

    <div style="margin: 10px; width: 100%;">
        {% for dojo in dojos %}
        <div style="flex: 1;">
            <form action="/dojo/{{dojo.id}}/delete" method="post">
                {% csrf_token %}
                <h1>{{dojo.ninjas.count}} Ninjas at {{ dojo.name }}</h1>
                <button type="submit">Delete {{dojo.name}}</button>
            </form>
        </div>
        {% endfor %}
    </div>
    
</body>
</html>
