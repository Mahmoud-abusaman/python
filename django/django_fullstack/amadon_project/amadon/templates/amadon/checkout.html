<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Amadon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .checkout-box { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 500px;
            margin: auto;
        }
        .highlight { color: #007bff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="checkout-box">
            <h1 class="h3 mb-4">Thank you for your business!</h1>
            <p class="lead">We just charged your card for <span class="highlight">${{ request.session.last_order_charge|floatformat:2 }}</span></p>
            <hr>
            <p>You have ordered <span class="highlight">{{ request.session.total_quantity }}</span> items and have been charged <span class="highlight">${{ request.session.total_amount|floatformat:2 }}</span> to date.</p>
            <div class="mt-4">
                <a href="/amadon/" class="btn btn-outline-primary">Go Back</a>
            </div>
        </div>
    </div>
</body>
</html>
